<!-- Adicionar no <main> -->
<section id="login" class="section">
  <h2>Login / Cadastro</h2>
  <form id="formLogin">
    <label for="usuario">Usuário:</label>
    <input type="text" id="usuario" required>
    <label for="senha">Senha:</label>
    <input type="password" id="senha" required>
    <button type="submit">Entrar</button>
  </form>
  <p id="mensagemLogin"></p>
</section>

<section id="ranking" class="section">
  <h2>Ranking de Colecionadores</h2>
  <ol id="listaRanking"></ol>
</section>

<section id="conquistas" class="section">
  <h2>Minhas Conquistas</h2>
  <ul id="listaConquistas"></ul>
</section>

<section id="busca" class="section">
  <h2>Buscar Figurinha</h2>
  <input type="text" id="campoBusca" placeholder="Digite o nome da figurinha...">
  <div id="resultadoBusca" class="figurinha-lista"></div>
</section>
